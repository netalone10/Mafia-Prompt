name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy ke cPanel via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/deploy.lftp << EOF
          set ftp:ssl-allow no
          open -u mafia@prompt.amuharr.com,$FTP_PASSWORD server902.shared.spaceship.host
          mirror --reverse --verbose .next promptforge-id/.next
          mirror --reverse --verbose public promptforge-id/public
          put package.json -o promptforge-id/package.json
          put package-lock.json -o promptforge-id/package-lock.json
          put server.js -o promptforge-id/server.js
          put next.config.ts -o promptforge-id/next.config.ts
          mkdir -p promptforge-id/tmp
          put /dev/null -o promptforge-id/tmp/restart.txt
          bye
          EOF
          lftp -f /tmp/deploy.lftp
