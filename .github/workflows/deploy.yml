name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy files via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            open -u 'mafia@prompt.amuharr.com','$FTP_PASSWORD' server902.shared.spaceship.host;
            mirror -R --delete --verbose \
              --exclude node_modules/ \
              --exclude .git/ \
              --exclude .env.local \
              --exclude .env \
              ./ /home/ixqbglfurr/promptforge-id/;
            bye
          "

      - name: Restart Node.js App
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          mkdir -p tmp
          touch tmp/restart.txt
          lftp -c "
            set ftp:ssl-allow no;
            open -u 'mafia@prompt.amuharr.com','$FTP_PASSWORD' server902.shared.spaceship.host;
            mkdir -p /home/ixqbglfurr/promptforge-id/tmp;
            put tmp/restart.txt -o /home/ixqbglfurr/promptforge-id/tmp/restart.txt;
            bye
          "
