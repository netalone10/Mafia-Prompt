name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy ke cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: server902.shared.spaceship.host
          username: mafia@prompt.amuharr.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /prompt.amuharr.com/
          dangerous-clean-slate: false
